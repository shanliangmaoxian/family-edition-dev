name: "发布版本"

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm' # 自动缓存 node_modules

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # 关键：缓存 Rust 编译产物，显著提升二次编译速度
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # 缓存存放的路径，针对 Tauri 项目通常是 src-tauri
          workspaces: './src-tauri -> target'

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm ci # 使用 ci 代替 install，速度更快且版本更严格

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # 标签名会自动从 tauri.conf.json 读取
          releaseName: "家庭进销存 v__VERSION__"
          releaseBody: "自动生成的发布版本。"
          releaseDraft: true
          prerelease: false
